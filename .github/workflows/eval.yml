# Macro-accuracy eval for MCP PRs: tool-layer changes (lookup
# providers, nutrition tool schemas/descriptions) can move the agent's
# estimation accuracy, so PRs here get the same sticky eval comment as
# agent PRs. The harness lives in prog-strength-agent; this workflow
# runs it with THIS PR's MCP checkout against agent@main.
#
# Requires repo secrets: ANTHROPIC_API_KEY (and optionally the
# FATSECRET_*/USDA_FDC_API_KEY provider keys), plus the org setting
# allowing this repo to call prog-strength-agent's reusable workflows.
name: Macro Eval

on:
  pull_request:
    paths:
      - "src/**"
      - "pyproject.toml"
      - "uv.lock"

permissions:
  contents: write
  pull-requests: write
  actions: read

concurrency:
  group: macro-eval-${{ github.ref }}
  cancel-in-progress: true

jobs:
  eval:
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'eval:skip') }}
    uses: Prog-Strength/prog-strength-agent/.github/workflows/eval-reusable.yml@main
    with:
      mcp_ref: ${{ github.event.pull_request.head.sha }}
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      FATSECRET_CLIENT_ID: ${{ secrets.FATSECRET_CLIENT_ID }}
      FATSECRET_CLIENT_SECRET: ${{ secrets.FATSECRET_CLIENT_SECRET }}
      USDA_FDC_API_KEY: ${{ secrets.USDA_FDC_API_KEY }}
