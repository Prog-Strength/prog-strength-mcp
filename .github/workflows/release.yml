name: Release and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write       # for tag + changelog commit push
  issues: write         # for release notes linking
  pull-requests: write  # for release notes linking

# Prevent two concurrent release runs from racing on tags. cancel-in-progress
# is false so an in-flight deploy completes rather than getting killed.
concurrency:
  group: release-deploy
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          # semantic-release walks history to find the previous tag.
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Run semantic-release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Build the mcp image on the GitHub runner and push it to ECR under the
  # released version tag. The EC2 host pulls this same tag at deploy time,
  # so the build environment is consistent across releases and divorced
  # from the host's disk pressure.
  build_and_push:
    needs: release
    if: needs.release.outputs.new_release_published == 'true'
    # The EC2 host is Graviton (arm64). Build natively on a GitHub-hosted
    # ARM runner so the image's only manifest is linux/arm64 — same cost
    # as x86, no QEMU emulation overhead (which matters a lot for Python
    # builds that compile C extensions).
    runs-on: ubuntu-24.04-arm
    permissions:
      id-token: write # mint the OIDC token for configure-aws-credentials
      contents: read # checkout of the released tag
    steps:
      - uses: actions/checkout@v4
        with:
          # Build from the exact released tag, not the moving HEAD of main.
          ref: v${{ needs.release.outputs.new_release_version }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GHA_ROLE_ARN }}
          aws-region: us-east-2

      - id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: Build and push mcp image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Repo is configured IMMUTABLE in terraform, so this tag can
          # only be pushed once. A re-run of release.yml against an
          # existing version will fail at push — intended safeguard.
          tags: ${{ steps.ecr-login.outputs.registry }}/prog-strength-prod/mcp:v${{ needs.release.outputs.new_release_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [release, build_and_push]
    if: needs.release.outputs.new_release_published == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write # mint the OIDC token for configure-aws-credentials
      contents: read
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GHA_ROLE_ARN }}
          aws-region: us-east-2

      - name: Deploy tagged version via SSM Run Command
        env:
          RELEASE_VERSION: ${{ needs.release.outputs.new_release_version }}
        run: |
          set -euo pipefail

          # Invoke the versioned on-host deploy script via SSM Run Command —
          # no SSH, no inbound port 22. The host is targeted by its Name tag
          # (survives an instance replacement, so no EC2_HOST). The script
          # reads app secrets from Secrets Manager via the instance role, so
          # only the non-secret version tag travels with the command. Run as
          # the ubuntu user so the infra checkout + docker creds keep their
          # ownership.
          command_id="$(aws ssm send-command \
            --document-name AWS-RunShellScript \
            --comment "Deploy mcp v${RELEASE_VERSION}" \
            --targets "Key=tag:Name,Values=prog-strength-prod-backend" \
            --parameters commands="sudo -u ubuntu -H bash /home/ubuntu/prog-strength-infra/deploy/mcp.sh v${RELEASE_VERSION}" \
            --query 'Command.CommandId' --output text)"
          echo "SSM command dispatched: ${command_id}"

          instance_id=""
          for _ in $(seq 1 30); do
            instance_id="$(aws ssm list-command-invocations \
              --command-id "${command_id}" \
              --query 'CommandInvocations[0].InstanceId' --output text)"
            [ -n "${instance_id}" ] && [ "${instance_id}" != "None" ] && break
            sleep 2
          done
          if [ -z "${instance_id}" ] || [ "${instance_id}" = "None" ]; then
            echo "No SSM invocation registered for command ${command_id}" >&2
            exit 1
          fi
          echo "Running on instance: ${instance_id}"

          # Poll to completion so the workflow reflects the real deploy exit
          # status (the guarantee set -e gave over SSH).
          while true; do
            status="$(aws ssm get-command-invocation \
              --command-id "${command_id}" --instance-id "${instance_id}" \
              --query 'Status' --output text)"
            case "${status}" in
              Success) break ;;
              Pending | InProgress | Delayed) sleep 5 ;;
              *)
                echo "Deploy failed with status: ${status}" >&2
                aws ssm get-command-invocation \
                  --command-id "${command_id}" --instance-id "${instance_id}" \
                  --query 'StandardErrorContent' --output text >&2 || true
                aws ssm get-command-invocation \
                  --command-id "${command_id}" --instance-id "${instance_id}" \
                  --query 'StandardOutputContent' --output text || true
                exit 1
                ;;
            esac
          done

          echo "Deploy succeeded."
          aws ssm get-command-invocation \
            --command-id "${command_id}" --instance-id "${instance_id}" \
            --query 'StandardOutputContent' --output text
